name: CI

on:
  push:
    branches: ["main", "claude/**"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:
  schedule:
    # Weekly bit-rot check (Mondays 10:00 UTC). Pulse has no deploy, so nothing ships from this.
    - cron: "0 10 * * 1"

jobs:
  secret-scan:
    name: "Secret scan (gitleaks)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0   # full history so a secret in any past commit is caught
      - run: docker run --rm -v "$PWD:/repo" zricethezav/gitleaks:latest detect --source /repo --redact --no-banner

  build:
    name: "pulse-ui — Assemble"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v6
      - run: echo "sdk.dir=$ANDROID_HOME" > local.properties
      - run: ./gradlew :pulse-ui:assembleRelease --no-daemon
