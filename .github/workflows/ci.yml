name: CI

on:
  push:
    branches: ["main", "claude/**"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:
  schedule:
    # Weekly bit-rot check (Mondays 10:00 UTC). Pulse has no deploy, so nothing ships from this.
    - cron: "0 10 * * 1"

jobs:
  secret-scan:
    name: "Secret scan (gitleaks)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0   # full history so a secret in any past commit is caught
      - run: docker run --rm -v "$PWD:/repo" zricethezav/gitleaks:latest detect --source /repo --redact --no-banner

  # Machine-readable API contract: pulse-index.json must stay in lockstep with the component
  # source and the curated pulse-meta.json (see AGENTS.md). Parses .kt text only — no Android SDK
  # or Gradle needed, so it's a fast standalone JDK job. Fails if the committed index is stale or
  # a component is missing/orphaned in the sidecar; fix with `java tools/PulseIndex.java generate`.
  index-drift:
    name: "Component index (pulse-index.json)"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
      - run: java tools/PulseIndex.java verify .

  build:
    name: "pulse-ui — Assemble"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v6
      - run: echo "sdk.dir=$ANDROID_HOME" > local.properties
      - run: ./gradlew :pulse-ui:assembleRelease --no-daemon

  # Consumer gate: :pulse-ui:assemble alone skips checkDebugAarMetadata, so it can't catch a
  # change here that breaks a consumer's build (the core-ktx 1.19 incident). Build the cheapest
  # consumer (Cookbook) against THIS Pulse checkout via the composite build, so consumer breakage
  # fails Pulse CI here instead of the four apps' main. ROADMAP2 Tier 1 #8.
  consumer-build:
    name: "Consumer build (Cookbook :app:assembleDebug)"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
        with:
          path: Pulse                       # the PR's Pulse — what Cookbook's composite build consumes
      - uses: actions/checkout@v7
        with:
          repository: CDRaab01/Cookbook     # Cookbook/android's settings does includeBuild("../../Pulse")
          path: Cookbook
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v6
      - name: Write local.properties
        working-directory: Cookbook/android
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          echo "server.url=https://cookbook.dragonflymedia.org/" >> local.properties
      - name: Assemble Cookbook against this Pulse
        working-directory: Cookbook/android
        run: ./gradlew :app:assembleDebug --no-daemon
