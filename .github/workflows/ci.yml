name: CI

on:
  push:
    branches: ["main", "claude/**"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:
  schedule:
    # Weekly bit-rot check (Mondays 10:00 UTC). Pulse has no deploy, so nothing ships from this.
    - cron: "0 10 * * 1"

jobs:
  build:
    name: "pulse-ui — Assemble"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
      - run: echo "sdk.dir=$ANDROID_HOME" > local.properties
      - run: ./gradlew :pulse-ui:assembleRelease --no-daemon
