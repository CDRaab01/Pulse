version: 2

# Weekly grouped dependency updates for the shared pulse-ui library (ROADMAP Tier 2 #2).
# The AGP / Kotlin / Compose-BOM versions are the suite's source of truth (all consumers must
# match via composite build), so Dependabot must not auto-bump them — including their Gradle
# *plugin* coordinates (the plugin form `org.jetbrains.kotlin.android` slipped past a
# `org.jetbrains.kotlin:*` ignore and pulled Kotlin 2.4.0). Major bumps also need manual
# migration, so auto-PRs stay on minor/patch.

updates:
  - package-ecosystem: "gradle"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    ignore:
      - dependency-name: "com.android*"
      - dependency-name: "org.jetbrains.kotlin*"
      - dependency-name: "androidx.compose:compose-bom"
      - dependency-name: "*"
        update-types: ["version-update:semver-major", "version-update:semver-minor"]
    groups:
      gradle:
        patterns: ["*"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      actions:
        patterns: ["*"]
